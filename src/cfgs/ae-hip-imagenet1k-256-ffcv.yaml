# FFCV-backed ImageNet-1k 256x256 cfg.

_base_:
  - cfgs/env/cluster.yaml
  - cfgs/trainers/ae.yaml

ckpt_select_metric:
  name: psnr
  type: max

visualize:
  resolution: 256
  ds_samples: 16

use_amp: false
# To enable bf16 autocast set:
#   use_amp: true
#   amp_dtype: bf16
use_compile: false

# ImageNet-1k uses manual iteration counts (not epoch-based).
auto_schedule: false
epoch_iter: 2500
max_iter: 1000000
eval_iter: 7500
vis_iter: 7500
save_iter: 7500

# Checkpoint-resume: see ae-hip-imagenet1k-128-generic-nef.yaml for rationale.
save_last_ckpt: true
save_last_iter: 250

# Val renders full 256x256 grid; the FFCV loader keeps eval batches small.
eval_batch_size: 16

visualize_subset:
  enable: true
  n_samples: 128
  seed: 0
  batch_size: ${eval_batch_size}
  num_workers: 0

eval_subset:
  enable: true
  n_samples: 2048
  seed: 0

train_psnr_proxy:
  enable: true
  every_epochs: 1
  n_samples: 256
  batch_size: ${eval_batch_size}
  num_workers: 0

hrft_start_after_iters: null

datasets:
  train:
    name: wrapper_ffcv_imagenet256
    args:
      beton_path: /scratch/htc/aurbano/datasets/imagenet256_ffcv/train.beton
      # Full-grid (no subsampling) by default. Set to e.g. 16384 to subsample queries
      gt_n_query: null
      gt_replace: false
    loader:
      # Per-rank batch_size = batch_size // world_size at make_loader time.
      batch_size: 96
      num_workers: 8

  val:
    name: wrapper_ffcv_imagenet256
    args:
      beton_path: /scratch/htc/aurbano/datasets/imagenet256_ffcv/val.beton
      gt_n_query: null
      gt_replace: false
    loader:
      batch_size: ${eval_batch_size}
      num_workers: 8

  test:
    name: wrapper_ffcv_imagenet256
    args:
      beton_path: /scratch/htc/aurbano/datasets/imagenet256_ffcv/test.beton
      gt_n_query: null
      gt_replace: false
    loader:
      batch_size: ${eval_batch_size}
      num_workers: 8

model:
  name: lhnef
  args:

    z_shape: [1, 1, 1]

    encoder:
      name: encoder_hip_coord_value
      args:
        coord_dim: 2
        value_dim: 3
        z_channels: 1
        z_hw: [1, 1]
        hip_variant: IN128_G128_K4_C28
        num_embedding_channels: 64
        pos_encoding: fourier
        fourier_bands: 32
        fourier_max_freq: 40.0
        coord_grouping: voxel
        coord_bits: 10
        hip_run_decoder: false
        render_block_index: -1
        hip_cache_group_regions: true

    decoder: null

    renderer:
      name: renderer_hip_encoder_group_field
      args:
        coord_dim: 2
        head_kind: point_mlp
        out_dim: 3
        point_hidden: 256
        point_depth: 3

        d_model: 128
        n_heads: 8
        dropout: 0.0
        sdpa_backend: auto

        routing_mode: knn
        knn_k: 4
        knn_p: 1.0
        knn_eps: 1e-6

        knn_weighting: gaussian
        knn_gaussian_sigma: 0.25
        knn_gaussian_sigma_learnable: true

        knn_cap_small_groups: false
        knn_small_groups_threshold: 8
        knn_small_groups_k: 1

        fusion: gated_sum
        gated_sum_stream: true
        use_liif_geometry: false
        rel_pe_dim: 16
        rel_pe_w_max: 10.0

        value_film: true
        value_film_pe_dim: 16
        value_film_pe_w_max: 10.0
        value_film_hidden: 256

        coord_pe_dim: 16
        coord_pe_w_max: 10.0
        cell_pe_dim: 16
        cell_pe_w_max: 10.0

    loss_cfg:
      l1_loss: 1.0

optimizers:
  encoder:
    name: adamw
    args: { lr: 8.0e-4, betas: [0.9, 0.99], weight_decay: 0.01 }
  decoder: null
  renderer:
    name: adam
    args: { lr: 3.0e-4, betas: [0.5, 0.9] }
