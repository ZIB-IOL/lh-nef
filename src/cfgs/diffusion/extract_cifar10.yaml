_base_:
  - cfgs/env/cluster.yaml

trainer: hip_latent_extract_trainer

datasets:
  train:
    name: wrapper_cae_coord_value
    args:
      dataset:
        name: cifar10
        args:
          split: train
          root_path: ${oc.env:LHNEF_DATA_ROOT,${oc.env:INFD_DATA_ROOT,load}}/cifar10
          download: true
          return_label: true
      resize_inp: 32
      resize_gt_lb: 32
      resize_gt_ub: 32
      final_crop_gt: 32
      p_whole: 0.0
    loader:
      batch_size: 512
      num_workers: 8

  val:
    name: wrapper_cae_coord_value
    args:
      dataset:
        name: cifar10
        args:
          split: val
          root_path: ${oc.env:LHNEF_DATA_ROOT,${oc.env:INFD_DATA_ROOT,load}}/cifar10
          download: true
          return_label: true
      resize_inp: 32
      resize_gt_lb: 32
      resize_gt_ub: 32
      final_crop_gt: 32
      p_whole: 0.0
    loader:
      batch_size: 512
      num_workers: 8

extract:
  stage1_ckpt: /ABS/PATH/TO/STAGE1/best-model.pth

  out_root: from_stage1_ckpt
  out_subdir: extract/latents_cifar10_tc
  stats_mode: token_channel

  splits: [train, val]
  block: last

  shard_size: 2048

  batch_size: 512
  num_workers: 8

  save_dtype: float16
  use_amp: false

