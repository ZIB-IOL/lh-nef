_base_:
  - cfgs/env/cluster.yaml
  - cfgs/trainers/ae.yaml

ckpt_select_metric:
  name: psnr
  type: max

visualize:
  resolution: 32
  ds_samples: 16

auto_schedule: true
train_epochs: 900
eval_every_epochs: 10

use_amp: false
use_compile: false

hrft_start_after_iters: null

datasets:
  train:
    name: wrapper_cae_coord_value
    args:
      dataset:
        name: cifar10
        args:
          split: train
          root_path: ${oc.env:LHNEF_DATA_ROOT,${oc.env:INFD_DATA_ROOT,load}}/cifar10
          download: true
          return_label: true
      resize_inp: 32
      resize_gt_lb: 32
      resize_gt_ub: 32
      final_crop_gt: 32
      p_whole: 0.0
    loader:
      batch_size: 384
      num_workers: 8

  val:
    name: wrapper_cae_coord_value
    args:
      dataset:
        name: cifar10
        args:
          split: val
          root_path: ${oc.env:LHNEF_DATA_ROOT,${oc.env:INFD_DATA_ROOT,load}}/cifar10
          download: true
          return_label: true
      resize_inp: 32
      resize_gt_lb: 32
      resize_gt_ub: 32
      final_crop_gt: 32
      p_whole: 0.0
    loader:
      batch_size: 384
      num_workers: 8

model:
  name: lhnef
  args:

    z_shape: [1, 1, 1]

    encoder:
      name: encoder_hip_coord_value
      args:
        coord_dim: 2
        value_dim: 3
        z_channels: 1
        z_hw: [1, 1]
        hip_variant: C10_4STAGE_G128_LAST32_C16_K4
        num_embedding_channels: 64
        pos_encoding: fourier
        fourier_bands: 16
        fourier_max_freq: 40.0
        coord_grouping: voxel
        hip_run_decoder: false
        render_block_index: -1
        hip_cache_group_regions: true

    decoder: null

    renderer:
      name: renderer_hip_encoder_group_field
      args:
        coord_dim: 2
        head_kind: point_mlp
        out_dim: 3
        point_hidden: 128
        point_depth: 3

        d_model: 128
        n_heads: 8
        dropout: 0.0
        sdpa_backend: auto

        routing_mode: knn
        knn_k: 4
        knn_p: 1.0
        knn_eps: 1e-6

        knn_weighting: gaussian
        knn_gaussian_sigma: 0.25
        knn_gaussian_sigma_learnable: true
        value_film: true
        value_film_pe_dim: 16
        value_film_pe_w_max: 10.0
        value_film_hidden: 256

        knn_cap_small_groups: false
        knn_small_groups_threshold: 8
        knn_small_groups_k: 1

        fusion: gated_sum
        gated_sum_stream: true
        use_liif_geometry: false
        rel_pe_dim: 32
        rel_pe_w_max: 10.0

        coord_pe_dim: 32
        coord_pe_w_max: 10.0
        cell_pe_dim: 16
        cell_pe_w_max: 10.0


    loss_cfg:
      l1_loss: 1.0

optimizers:
  encoder:
    name: adamw
    args: { lr: 1.2e-3, betas: [0.9, 0.99], weight_decay: 5.3e-3 }
  decoder: null
  renderer:
    name: adam
    args: { lr: 1.8e-4, betas: [0.5, 0.9] }
